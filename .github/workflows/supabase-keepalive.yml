name: Supabase Keepalive

on:
  push:
    branches:
      - main
  schedule:
    # Runs once a day at 03:17 UTC.
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_KEEPALIVE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEEPALIVE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "Missing SUPABASE_KEEPALIVE_URL or SUPABASE_KEEPALIVE_ANON_KEY repository secret."
            exit 1
          fi

          curl --fail --silent --show-error \
            "${SUPABASE_URL%/}/rest/v1/products?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Accept: application/json" \
            --output /dev/null
